  src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">

<style>
  :root {
    --bg: #f3f7ff;
    --surface: #ffffff;
    --text: #1b2440;
    --accent: #2e7de9;
  }

  body {
    background: radial-gradient(circle at 20% 5%, color-mix(in srgb, var(--surface) 62%, var(--bg) 38%) 0%, var(--bg) 65%);
    color: var(--text);
    font-size: 17px;
    line-height: 1.68;
  }
  #gabor-bg {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
    opacity: 0.36;
  }
  .main,
  .main-header,
  .main-content-wrap,
  .site-header,
  .site-nav,
  .site-footer {
    position: relative;
    z-index: 1;
  }
  .side-bar { z-index: 2; }

  h1 { font-size: clamp(2rem, 4vw, 2.8rem); line-height: 1.15; margin-top: 2rem; }
  h2 { font-size: clamp(1.4rem, 3vw, 2rem); line-height: 1.25; margin-top: 2rem; }
  h3 { font-size: clamp(1.1rem, 2vw, 1.35rem); line-height: 1.35; }
  p, li { max-width: 78ch; }

  @media (min-width: 50rem) {
    .main-content {
      max-width: 72rem;
    }
  }

  .side-bar {
    background: linear-gradient(180deg, color-mix(in srgb, var(--surface) 74%, var(--bg) 26%), color-mix(in srgb, var(--surface) 50%, var(--bg) 50%));
    border-right: 1px solid color-mix(in srgb, var(--accent) 35%, transparent);
  }
  .site-header {
    position: relative;
    background: transparent;
    border-bottom: 1px solid color-mix(in srgb, var(--accent) 20%, transparent);
  }
  .site-title, .site-title:visited {
    color: var(--text);
    display: inline-block;
    height: 79px;
    padding-top: 14px;
    padding-bottom: 12px;
    padding-right: 3.3rem;
  }
  #site-nav {
    height: 743px;
    padding-top: 40px;
    padding-right: 13px;
  }
  #omer-yildiran {
    height: 42px;
  }
  .site-footer { border-top: 1px solid color-mix(in srgb, var(--accent) 20%, transparent); color: color-mix(in srgb, var(--text) 72%, #7d89aa 28%); }

  .nav-list .nav-list-item .nav-list-link { color: color-mix(in srgb, var(--text) 80%, var(--accent) 20%); border-radius: 10px; }
  .nav-list .nav-list-item .nav-list-link:hover,
  .nav-list .nav-list-item .nav-list-link.active { background: color-mix(in srgb, var(--accent) 16%, transparent); color: var(--text); }
  .search-input { background: color-mix(in srgb, var(--surface) 85%, #000 15%); border: 1px solid color-mix(in srgb, var(--accent) 35%, transparent); color: var(--text); }

  .hero-banner { width: 100%; height: 375px; object-fit: cover; border-radius: 14px; margin: 0.6rem 0 1.1rem; box-shadow: 0 20px 60px rgba(0,0,0,.35); }
  .project-card {
    border: 1px solid color-mix(in srgb, var(--accent) 35%, transparent);
    border-radius: 14px;
    padding: 1rem 1rem 1.1rem;
    margin: 1rem 0 1.35rem;
    background: linear-gradient(180deg, color-mix(in srgb, var(--surface) 74%, #1f2f58 26%), color-mix(in srgb, var(--surface) 92%, #000 8%));
    box-shadow: 0 10px 35px rgba(0,0,0,.3);
    opacity: 0;
    transform: translateY(24px);
    transition: transform .45s ease, opacity .45s ease, border-color .3s ease;
  }
  .project-card.is-visible { opacity: 1; transform: translateY(0); }
  .project-card:hover { border-color: color-mix(in srgb, var(--accent) 65%, transparent); }
  .link-chip {
    display: inline-block; margin: .25rem .35rem .1rem 0; padding: .26rem .62rem; border-radius: 999px;
    border: 1px solid color-mix(in srgb, var(--accent) 55%, transparent);
    background: color-mix(in srgb, var(--surface) 78%, #000 22%);
    color: var(--text); font-size: .86rem;
  }
  .media-frame { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; margin-top: .85rem; }
  .media-embed { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; border-radius: 10px; }
  .project-media, .project-image { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 10px; margin-top: .85rem; background: #000; }
  .feature-link { border: 1px solid color-mix(in srgb, var(--accent) 45%, transparent); border-radius: 10px; padding: .9rem; margin-top: .8rem; }

  @media (min-width: 50rem) {
    .side-bar {
      width: 154px;
    }
    .side-bar + .main {
      margin-left: 154px;
    }
    .site-nav,
    .site-header,
    .site-footer {
      width: 154px;
    }
  }
  @media (min-width: 66.5rem) {
    .side-bar {
      width: calc((100% - 80rem) / 2 + 154px);
      min-width: 154px;
    }
    .side-bar + .main {
      margin-left: max(154px, (100% - 80rem) / 2 + 154px);
    }
    .site-nav,
    .site-header,
    .site-footer {
      width: 154px;
    }
  }
</style>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    if (!document.getElementById("gabor-bg")) {
      const canvas = document.createElement("canvas");
      canvas.id = "gabor-bg";
      document.body.prepend(canvas);
      const ctx = canvas.getContext("2d");
      if (!ctx) return;

      const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const dpr = Math.min(window.devicePixelRatio || 1, 1.8);
      let width = 0;
      let height = 0;
      let rafId = null;
      const phaseStep = prefersReducedMotion ? 0 : 0.085;
      const drift = prefersReducedMotion ? 0 : 1.3;

      const patches = Array.from({ length: 24 }, (_, i) => ({
        x: Math.random(),
        y: Math.random(),
        sigma: 10 + Math.random() * 12,
        freq: 0.07 + Math.random() * 0.08,
        phase: Math.random() * Math.PI * 2,
        angle: (Math.PI / 6) * i + Math.random() * 0.5,
        speedX: (Math.random() - 0.5) * drift,
        speedY: (Math.random() - 0.5) * drift,
        tint: i % 2 === 0 ? "rgba(102,212,255,0.55)" : "rgba(174,196,255,0.45)"
      }));

      function resize() {
        width = Math.floor(window.innerWidth);
        height = Math.floor(window.innerHeight);
        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        canvas.style.width = width + "px";
        canvas.style.height = height + "px";
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      function drawPatch(p) {
        const cx = p.x * width;
        const cy = p.y * height;
        const r = p.sigma * 1.8;
        const cosA = Math.cos(p.angle);
        const sinA = Math.sin(p.angle);

        for (let yy = -r; yy <= r; yy += 2) {
          for (let xx = -r; xx <= r; xx += 2) {
            const xr = xx * cosA + yy * sinA;
            const yr = -xx * sinA + yy * cosA;
            const g = Math.exp(-(xr * xr + yr * yr) / (2 * p.sigma * p.sigma));
            if (g < 0.05) continue;
            const wave = Math.cos(2 * Math.PI * p.freq * xr + p.phase);
            const alpha = Math.max(0, g * (wave * 0.5 + 0.5)) * 0.36;
            if (alpha < 0.02) continue;
            ctx.fillStyle = p.tint.replace(/0\.\d+\)/, alpha.toFixed(3) + ")");
            ctx.fillRect(cx + xx, cy + yy, 2, 2);
          }
        }
      }

      function tick() {
        ctx.clearRect(0, 0, width, height);
        patches.forEach((p) => {
          p.phase += phaseStep;
          p.x += p.speedX / width;
          p.y += p.speedY / height;
          if (p.x < -0.15) p.x = 1.15;
          if (p.x > 1.15) p.x = -0.15;
          if (p.y < -0.15) p.y = 1.15;
          if (p.y > 1.15) p.y = -0.15;
          drawPatch(p);
        });
        rafId = requestAnimationFrame(tick);
      }

      resize();
      tick();
      window.addEventListener("resize", resize);
      window.addEventListener("beforeunload", () => {
        if (rafId) cancelAnimationFrame(rafId);
      });
    }
  });
</script>
